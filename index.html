<!DOCTYPE html>
<html>
<head>
  <title>Uneco</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f8f6f1;
      color: #1f2a44;
    }
    .center {
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 32px;
    }
    .question {
      font-size: 34px;
      margin-bottom: 36px;
    }
    .mic {
      font-size: 58px;
      margin-bottom: 36px;
      animation: pulse 2s infinite;
    }
    input {
      width: 360px;
      padding: 14px 18px;
      border: none;
      border-bottom: 1px solid #999;
      background: transparent;
      font-size: 18px;
      text-align: center;
      outline: none;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.75; }
      50% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 0.75; }
    }
  </style>
</head>
<body>
  <div class="center">
    <h1>Good morning, Reed.</h1>
    <div class="question">What would you like to understand?</div>
    <div class="mic">🎤</div>
    <input placeholder="Type or speak..." />
  </div>
</body>
</html>
